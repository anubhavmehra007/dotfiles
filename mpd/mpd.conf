# Files and directories
music_directory    "~/Music/mpd_master"
playlist_directory "~/.config/mpd/playlists"
db_file            "~/.config/mpd/database"
log_file           "~/.config/mpd/log"
pid_file           "~/.config/mpd/pid"
state_file         "~/.config/mpd/state"
sticker_file       "~/.config/mpd/sticker.sql"

# Network
bind_to_address    "0.0.0.0"
port               "6600"

# Follow symbolic links (Crucial for your 2-location setup)
follow_outside_symlinks "yes"
follow_inside_symlinks  "yes"
auto_update            "yes"
# Explicitly disable internal volume processing
replaygain             "off"
volume_normalization    "no"

# Ensure MPD isn't fighting with EasyEffects for volume control
mixer_type            "software" 


# Audio Output (PipeWire/PulseAudio)
audio_output {
    type            "pipewire"
    name            "PipeWire Sound Server"
}

audio_output {
    type                    "fifo"
    name                    "my_fifo"
    path                    "/tmp/mpd.fifo"
    format                  "44100:16:2"
}
