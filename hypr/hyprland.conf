# --- 1. MONITOR ---
# --- MONITOR LAYOUT (External 1080p) ---
# 1. External Monitor (Primary - Left)
# Set to 1920x1080 at position 0,0
monitor = HDMI-A-1, 1920x1080, 0x0, 1
# 2. Laptop Monitor (Secondary - Right)
# Positioned exactly at 1920x0 (where the external ends)
# We keep the laptop at native 2560x1600 but use 1.6 scale 
# so windows look the same size as the 1080p screen.
monitor = eDP-1, 2560x1600, 1920x0, 1.6

# --- 2. NVIDIA SPECIFIC ---
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = XDG_CONFIG_HOME,$HOME/.config
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct

cursor {
    no_hardware_cursors = true
}

# --- 3. AUTOSTART ---
exec-once = hyprpolkitagent             # Password prompts
exec-once = waybar                       # The Top Bar
exec-once = hyprpaper                    # Wallpaper
exec-once = hypridle                    # Wallpaper
exec-once = easyeffects --gapplication-service # Your EQ

# --- 4. INPUT & GESTURES ---
input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

# --- 5. BINDS (The Essentials) ---
$mainMod = SUPER

bind = $mainMod, Return, exec, kitty           # Win + Enter (Terminal)
bind = $mainMod SHIFT, Q, killactive,          # Win + Shift + Q (Kill Window)
bind = $mainMod, D, exec, rofi -show drun      # Win + D (Rofi Launcher)
bind = $mainMod, M, exit,                # Exit Hyprland
bind = $mainMod, E, exec, kitty -e yazi        # File Manager (KDE one for now)
bind = $mainMod, I, exec, emacs
bind = $mainMod, V, togglefloating, 
bind = $mainMod SHIFT, S, exec, /usr/bin/change_output
bind = $mainMod SHIFT, R, exec, hyprctl reload; killall -SIGUSR2 waybar || waybar; hyprpaper

# YOUR CUSTOM BINDS
bind = CONTROL SHIFT, L, exec, makoctl dismiss -a && loginctl lock-session  # Lock System
# --- Workspace Swapping ---
# Win + B: Instantly swaps what's on your 1080p monitor with what's on the laptop
bind = $mainMod, B, swapactiveworkspaces, HDMI-A-1 eDP-1
# --- i3-style Workspace Binds ---
# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# This keeps your workspaces tied to specific monitors
workspace = 1, monitor:HDMI-A-1
workspace = 2, monitor:HDMI-A-1
workspace = 3, monitor:eDP-1
# Move focus with mainMod + HJKL
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d
# Move window positions with mainMod + SHIFT + HJKL
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d
# Maximize window (Win + F) - Keep Waybar visible with flag 1
bind = $mainMod, F, fullscreen, 1
# Resize windows with mainMod + ALT + HJKL
binde = $mainMod ALT, L, resizeactive, 30 0
binde = $mainMod ALT, H, resizeactive, -30 0
binde = $mainMod ALT, K, resizeactive, 0 -30
binde = $mainMod ALT, J, resizeactive, 0 30

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2

    # Triple-tone Purple Gradient (Mauve -> Deep Purple -> Lavender)
    col.active_border = rgb(cba6f7) rgb(94e2d5) 45deg
    
    # If you want it strictly Purplesque, use this instead:
    # col.active_border = rgb(cba6f7) rgb(8839ef) rgb(c6a0f6) 45deg

    col.inactive_border = rgba(585b70aa) # Subtle muted grey-purple for inactive windows

    layout = dwindle
}
animations {
    enabled = true
    
    # Standard animations
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    
    # The "Spinning Purple" Border
    animation = borderangle, 1, 20, default, loop 
}

decoration {
    rounding = 10
    blur {
        enabled = true
        size = 3
        passes = 2
	new_optimizations = true
    }
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(cba6f7ee) # Deep Purple Shadow
        color_inactive = rgba(1a1a1aee)
    }
}



# ============================================================
# SECTION: kde-gnome-deps
# Standalone Hyprland Infrastructure (Post-KDE Cleanup)
# ============================================================

# --- 1. Environment Variables (The "Purple" Foundation) ---
# Forces GTK and Qt apps to use the Catppuccin Mocha Mauve theme
env = GTK_THEME,Catppuccin-Mocha-Mauve-Standard+Default
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct

# --- 2. Auto-Start Services (The "Station" Engines) ---
# Authentication Agent (Fixes "Permission Denied" popups)
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Connectivity Trays (Network & Bluetooth)
exec-once = nm-applet --indicator
exec-once = blueman-applet

# Power & Stealth (Handles your 10s Screen Blackout)
exec-once = hypridle

# GTK Theme Apply (Ensures nwg-look settings persist)
exec-once = nwg-look -a

# Clipboard Sync (Ensures Nvim yank works with system)
exec-once = wl-paste --type text --watch cliphist store 
exec-once = wl-paste --type image --watch cliphist store

# --- 3. Hardware Keybinds (Laptop & Media Control) ---
# Volume Control (using wpctl for Pipewire)
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Brightness Control (Requires brightnessctl)
binde = , XF86MonBrightnessUp, exec, brightnessctl s 10%+
binde = , XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Media/Music Control (Works for rmpc & Spotify)
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# ============================================================
# END OF SECTION: kde-gnome-deps
# ============================================================
env = XDG_CURRENT_DESKTOP,Hyprland
env = GNOME_KEYRING_CONTROL,/run/user/1000/keyring
env = SSH_AUTH_SOCK,/run/user/1000/keyring/ssh
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = gnome-keyring-daemon --start --components=secrets,pkcs11,ssh

## Open RMPC in special window only and set binding to open rmpc
windowrule {
name = rmpc
match:class = rmpc
float = on
workspace = special
fullscreen = on
maximize = on
#size = (monitor_w) (monitor_h)
#move = (monitor_w*0.592) (monitor_h*0.041)
}
bind = SUPER, Grave, exec, pgrep rmpc && hyprctl dispatch togglespecialworkspace || kitty --class rmpc --title Music -e rmpc