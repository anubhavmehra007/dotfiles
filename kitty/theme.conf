# --- 1970s Monochrome Phosphor (P3) ---

# The "Glow" Colors
foreground            #33ff33
background            #080a08
selection_foreground  #080a08
selection_background  #33ff33

# Cursor (The Classic Blinking Block)
cursor                #33ff33
cursor_text_color     #080a08

# URL underline color when hovering
url_color             #57ff57

# Tab bar colors (Keep it minimal)
active_tab_foreground   #080a08
active_tab_background   #33ff33
inactive_tab_foreground #1b3d1b
inactive_tab_background #0d110d

# --- Terminal Colors (The 16-color Palette) ---
# In the 70s, colors were rare, but we map them to 
# different intensities of Green/Amber for usability.

# Black
color0 #1b3d1b
color8 #265426

# Red (Simulated as "Alert" Orange-Green)
color1 #cc5500
color9 #ff8800

# Green (The Primary)
color2  #33ff33
color10 #57ff57

# Yellow/Amber
color3  #ffb000
color11 #ffd700

# Blue (Deep Green-Blue)
color4  #004444
color12 #006666

# Magenta
color5  #1b3d1b
color13 #265426

# Cyan
color6  #008b8b
color14 #00afaf

# White (Off-white/Grey)
color7  #b2b2b2
color15 #ffffff
